apiVersion: v1
kind: Service
metadata:
  name: { { include "aicacia-object_storage_api.fullname" . } }
  labels: { { - include "aicacia-object_storage_api.labels" . | nindent 4 } }
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    { { - include "aicacia-object_storage_api.selectorLabels" . | nindent 4 } }
