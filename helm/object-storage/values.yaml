replicas:
  min: 1
  max: 16
  resource:
    cpu:
      utilization: 90

image:
  repository: ghcr.io/aicacia/object_storage
  tag: latest
  pullPolicy: Always
  hash: sha256:13ba025b6c186da3fdce3db68f192721fef8300ae02f2ae76c953d771b7180e4

app:
  port: 3000
  log_level: info
  url: api.object-storage.aicacia.com
  jwt:
    secret: secret
  database:
    url: postgres://postgres:postgres@localhost:5432/postgres
  mail:
    relay: ""
    username: ""
    password: ""

ingress:
  enabled: true
  annotations:
    kubernetes.io/tls-acme: "true"
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: api.object-storage.aicacia.com
      paths:
        - /
  tls:
    - secretName: aicacia-object-storage-com-tls
      hosts:
        - api.object-storage.aicacia.com

resources:
  requests:
    cpu: 15m
    memory: 105M
  limits:
    cpu: 250m
    memory: 512M
